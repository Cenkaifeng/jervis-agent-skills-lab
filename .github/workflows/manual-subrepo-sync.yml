name: manual-subrepo-sync

on:
  workflow_dispatch:
    inputs:
      skill_name:
        description: 'Skill name to sync (empty means all enabled)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Configure auth
        env:
          SKILL_SYNC_TOKEN: ${{ secrets.SKILL_SYNC_TOKEN }}
        run: |
          if [ -z "$SKILL_SYNC_TOKEN" ]; then
            echo "Missing SKILL_SYNC_TOKEN"
            exit 1
          fi
          git config --global user.name "skills-sync-bot"
          git config --global user.email "skills-sync-bot@users.noreply.github.com"
          git config --global url."https://x-access-token:${SKILL_SYNC_TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Sync
        env:
          SKILL: ${{ github.event.inputs.skill_name }}
        run: |
          if [ -n "$SKILL" ]; then
            ./scripts/sync-to-subrepos.sh "$SKILL"
          else
            ./scripts/sync-to-subrepos.sh
          fi
